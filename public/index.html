<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>NewsHub</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <header class="header">
    <div class="header-inner">
      <a class="logo" href="#">NewsHub</a>
      <div class="search-wrap" id="search-wrap">
        <input id="search-input" type="text" placeholder="Search news…" aria-label="Search news" autocomplete="off" />
        <button id="search-btn" aria-label="Search">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
          </svg>
        </button>
        <div id="search-history-dropdown" class="search-history-dropdown" hidden></div>
      </div>
      <select id="lang-select" aria-label="Select language">
        <option value="en">🇺🇸 EN</option>
        <option value="uk">🇺🇦 UA</option>
      </select>
      <button id="theme-toggle" aria-label="Toggle dark mode">🌙</button>
    </div>
  </header>

  <nav class="categories" role="navigation" aria-label="News categories">
    <button class="cat-btn active" data-category="general">General</button>
    <button class="cat-btn" data-category="technology">Technology</button>
    <button class="cat-btn" data-category="sports">Sports</button>
    <button class="cat-btn" data-category="business">Business</button>
    <button class="cat-btn" data-category="science">Science</button>
    <button class="cat-btn" data-category="health">Health</button>
    <button class="cat-btn" data-category="bookmarks">Bookmarks</button>
    <div id="custom-tabs"></div>
    <button id="add-cat-btn" aria-label="Add category">+</button>
  </nav>

  <main class="main">
    <div id="status-message" class="status-message" hidden></div>
    <div id="news-grid" class="news-grid" role="list"></div>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/date-fns@3/cdn.min.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
